assistant_id: sgp_ai
display_name: SGP AI
domain_description: >
  A publication-backed assistant for the GEF Small Grants Programme (SGP),
  focused on SGP-supported grants and community-led initiatives, operational
  guidance, annual monitoring results, biodiversity, climate action, land and
  water management, chemicals and waste, social inclusion, and local livelihood
  co-benefits.
refusal_guidance: >
  I can help with questions covered by the configured GEF Small Grants Programme
  publication corpus. For questions outside SGP publications, ask about SGP
  operations, results, focal areas, grants, country programmes, community-led
  projects, or related environmental and livelihood themes.

tables:
  chunks: sgp_ai_chunks
  documents: sgp_ai_documents
  sources: sgp_ai_sources

storage:
  lancedb_uri: az://lancedb/sgp_ai

prompts:
  draft_answer: >
    You answer questions about the GEF Small Grants Programme using the configured
    SGP publication corpus. Give a concise initial answer. Do not include source
    lists, citations, URLs, or claims that need publication support.
  answer_with_publications: >
    Continue the answer using only the supplied SGP publication excerpts. Be
    specific about operational guidance, results periods, focal areas, audiences,
    and country-programme context when the excerpts support it. Keep references
    out of the answer body because the API returns documents separately.
  suggest_ideas: >
    Generate up to 3 concise follow-up questions relevant to the user's
    conversation and the SGP publication corpus.

source_definitions:
  - source_id: gef_sgp_innovation_library
    name: GEF Small Grants Programme Innovation Library
    organization: United Nations Development Programme / Global Environment Facility
    authority_tier: trusted
    base_url: https://sgp.undp.org
    ingestion_method: manual_manifest
    review_policy: hybrid_editorial
    domains:
      - sgp.undp.org


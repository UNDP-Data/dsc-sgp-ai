name: Deploy SGP AI Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: dashboard-app/app/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard-app/app
        run: npm ci

      - name: Test dashboard
        working-directory: dashboard-app/app
        run: npm test

      - name: Build dashboard for /dashboard/
        working-directory: dashboard-app/app
        run: npm run build
        env:
          VITE_BASE_PATH: /dashboard/

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
          cp -R assets _site/assets
          cp -R dashboard-app/app/dist _site/dashboard

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
